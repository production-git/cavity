<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Annular shadow: transparent center, dark rim -->
    <radialGradient id="pd" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="70%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="87%"  stop-color="#000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.20"/>
    </radialGradient>
    <!-- Inner highlight -->
    <radialGradient id="ch" cx="50%" cy="22%" r="52%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <!-- Cu -->
    <radialGradient id="cu" cx="34%" cy="28%" r="62%">
      <stop offset="0%"   stop-color="#ff8060"/>
      <stop offset="42%"  stop-color="#be2e1c"/>
      <stop offset="100%" stop-color="#6a0f08"/>
    </radialGradient>
    <!-- O -->
    <radialGradient id="ox" cx="34%" cy="28%" r="62%">
      <stop offset="0%"   stop-color="#80caff"/>
      <stop offset="42%"  stop-color="#1a72c2"/>
      <stop offset="100%" stop-color="#082b5a"/>
    </radialGradient>
    <!-- C -->
    <radialGradient id="cc" cx="34%" cy="28%" r="62%">
      <stop offset="0%"   stop-color="#8faac0"/>
      <stop offset="42%"  stop-color="#3a5472"/>
      <stop offset="100%" stop-color="#1a2232"/>
    </radialGradient>
    <filter id="s" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="1.2" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!--
    Favicon: 8 atoms (4 Cu + 4 O alternating) at r=22 from center (32,32).
    Every 45deg. The void in the center is the cavity.

    Positions:
      0deg:   Cu (32, 10)
      45deg:  O  (47.6, 16.4)
      90deg:  Cu (54, 32)
      135deg: O  (47.6, 47.6)
      180deg: Cu (32, 54)
      225deg: O  (16.4, 47.6)
      270deg: Cu (10, 32)
      315deg: O  (16.4, 16.4)
  -->

  <!-- Depth shadow -->
  <circle cx="32" cy="32" r="22" fill="url(#pd)"/>
  <!-- Inner highlight -->
  <circle cx="32" cy="32" r="17" fill="url(#ch)"/>

  <!-- Bonds -->
  <g stroke="#3a608a" stroke-width="1.4" stroke-linecap="round" opacity="0.82">
    <line x1="32"   y1="10"   x2="47.6" y2="16.4"/>
    <line x1="47.6" y1="16.4" x2="54"   y2="32"/>
    <line x1="54"   y1="32"   x2="47.6" y2="47.6"/>
    <line x1="47.6" y1="47.6" x2="32"   y2="54"/>
    <line x1="32"   y1="54"   x2="16.4" y2="47.6"/>
    <line x1="16.4" y1="47.6" x2="10"   y2="32"/>
    <line x1="10"   y1="32"   x2="16.4" y2="16.4"/>
    <line x1="16.4" y1="16.4" x2="32"   y2="10"/>
  </g>

  <!-- Atoms -->
  <circle cx="32"   cy="10"   r="4.2"  fill="url(#cu)" filter="url(#s)"/>
  <circle cx="47.6" cy="16.4" r="2.9"  fill="url(#ox)" filter="url(#s)"/>
  <circle cx="54"   cy="32"   r="4.2"  fill="url(#cu)" filter="url(#s)"/>
  <circle cx="47.6" cy="47.6" r="2.9"  fill="url(#ox)" filter="url(#s)"/>
  <circle cx="32"   cy="54"   r="4.2"  fill="url(#cu)" filter="url(#s)"/>
  <circle cx="16.4" cy="47.6" r="2.9"  fill="url(#ox)" filter="url(#s)"/>
  <circle cx="10"   cy="32"   r="4.2"  fill="url(#cu)" filter="url(#s)"/>
  <circle cx="16.4" cy="16.4" r="2.9"  fill="url(#ox)" filter="url(#s)"/>
</svg>
